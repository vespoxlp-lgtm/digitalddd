<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Global Net Salary Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .gradient-bg { background: radial-gradient(circle at top, rgba(99,102,241,0.15) 0%, transparent 60%); }
    </style>
</head>
<body class="min-h-screen gradient-bg flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-3xl p-6 backdrop-blur-xl shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Kalkulačka čisté mzdy</h1>
            <p class="text-xs text-slate-400 mt-1">Zadej hrubý příjem a zjisti reálnou výplatu</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Hrubá měsíční mzda</label>
                <div class="relative rounded-2xl bg-slate-950 border border-slate-800 p-1 flex items-center">
                    <input type="number" id="grossInput" value="50000" class="w-full bg-transparent px-3 py-2 text-xl font-bold text-white outline-none" placeholder="0">
                    <span id="currencyLabel" class="text-slate-400 font-bold px-4 text-lg">Kč</span>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Země / Daňový režim</label>
                <select id="countrySelect" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500">
                    <option value="CZ" data-sym="Kč">🇨🇿 Česká republika (Přesné daně 2026)</option>
                    <option value="DE" data-sym="€">🇩🇪 Německo (Odhad 25% daň + 20% sociální)</option>
                    <option value="GB" data-sym="£">🇬🇧 Velká Británie (Základní pásmo)</option>
                    <option value="US" data-sym="$">🇺🇸 Spojené státy (Federální + FICA)</option>
                    <option value="SK" data-sym="€">🇸🇰 Slovensko (Standardní sazba)</option>
                    <option value="GLOBAL" data-sym="$">🌍 Ostatní státy (Průměrná daň 25%)</option>
                </select>
            </div>
        </div>

        <hr class="border-slate-800/80 my-6">

        <div class="space-y-3">
            <div class="bg-slate-950/60 border border-slate-800/50 rounded-2xl p-4 flex justify-between items-center">
                <div>
                    <p class="text-xs text-slate-400 font-medium">Odhadované daně & odvody</p>
                    <p class="text-[10px] text-slate-500 mt-0.5" id="taxDetail">Sociální, zdravotní a daň z příjmu</p>
                </div>
                <span id="taxValue" class="text-sm font-semibold text-rose-400">-14 570 Kč</span>
            </div>

            <div class="bg-indigo-650/10 border border-indigo-500/20 bg-indigo-950/40 rounded-2xl p-5 flex justify-between items-center">
                <div>
                    <p class="text-sm font-bold text-white">Čistá mzda na účet</p>
                    <p class="text-[11px] text-indigo-300 mt-0.5">Disponibilní příjem</p>
                </div>
                <span id="netValue" class="text-2xl font-extrabold text-emerald-400">35 430 Kč</span>
            </div>
        </div>
    </div>

    <script>
        const grossInput = document.getElementById('grossInput');
        const countrySelect = document.getElementById('countrySelect');
        const currencyLabel = document.getElementById('currencyLabel');
        const taxValue = document.getElementById('taxValue');
        const netValue = document.getElementById('netValue');
        const taxDetail = document.getElementById('taxDetail');

        function calculate() {
            const gross = parseFloat(grossInput.value) || 0;
            const country = countrySelect.value;
            const selectedOption = countrySelect.options[countrySelect.selectedIndex];
            const sym = selectedOption.getAttribute('data-sym');
            
            currencyLabel.innerText = sym;

            let net = 0;
            let detailText = "Sociální, zdravotní a daň";

            if (gross <= 0) {
                taxValue.innerText = `0 ${sym}`;
                netValue.innerText = `0 ${sym}`;
                return;
            }

            if (country === "CZ") {
                const soc = gross * 0.071;
                const hlt = gross * 0.045;
                const base = gross - soc - hlt;
                let tax = base <= 161328 ? base * 0.15 : 161328 * 0.15 + (base - 161328) * 0.23;
                tax = Math.max(0, tax - 2570); // Základní sleva na poplatníka
                net = gross - soc - hlt - tax;
                detailText = "7.1% soc, 4.5% zdrav, 15% daň (-sleva)";
            } else if (country === "DE") {
                const soc = gross * 0.20;
                const tax = Math.max(0, gross - 980) * 0.25;
                net = gross - soc - tax;
                detailText = "Cca 20% sociální + 25% daň";
            } else if (country === "GB") {
                const tax = Math.max(0, gross - 1047) * 0.20;
                const ni = Math.max(0, gross - 1047) * 0.08;
                net = gross - tax - ni;
                detailText = "Income Tax + National Insurance";
            } else if (country === "US") {
                const fica = gross * 0.0765;
                const fedTax = Math.max(0, gross - 1250) * 0.15;
                net = gross - fica - fedTax;
                detailText = "FICA (7.65%) + Fed Tax (Est. 15%)";
            } else if (country === "SK") {
                const odvody = gross * 0.134;
                const zdanitelnaMzda = gross - odvody - 380;
                const tax = Math.max(0, zdanitelnaMzda * 0.19);
                net = gross - odvody - tax;
                detailText = "13.4% odvody + 19% daň z příjmu";
            } else {
                net = gross * 0.75;
                detailText = "Paušální odhad 25% pro zbytek světa";
            }

            const totalTax = gross - net;

            taxValue.innerText = `-${Math.round(totalTax).toLocaleString('cs-CZ')} ${sym}`;
            netValue.innerText = `${Math.round(net).toLocaleString('cs-CZ')} ${sym}`;
            taxDetail.innerText = detailText;
        }

        grossInput.addEventListener('input', calculate);
        countrySelect.addEventListener('change', calculate);
        
        // První výpočet při načtení
        calculate();
    </script>
</body>
</html>
